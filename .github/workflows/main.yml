name: Birthday Reminder Bot

on:
  schedule:
    # 每天北京时间早上 9:00 运行 (UTC 01:00)
    - cron: '0 1 * * *'
  workflow_dispatch: 

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      # 就是这一段！放在这里：
      - name: Install dependencies
        run: |
          pip install requests zhdate

      - name: Run Script
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py
